name: Generate README literature index

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/generate_readme_index.py"
      - ".github/workflows/generate-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-readme-index
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate per-category literature tables
        run: python scripts/generate_readme_index.py

      - name: Commit the generated README
        shell: bash
        run: |
          if git diff --quiet -- Readme.md; then
            echo "README is already synchronized."
            exit 0
          fi
          git config user.name "axbhb"
          git config user.email "144993397+axbhb@users.noreply.github.com"
          git add Readme.md
          git commit -m "Format README as a per-category literature index"
          git push
