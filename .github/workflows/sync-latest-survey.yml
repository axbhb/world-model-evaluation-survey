name: Sync latest survey snapshot

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/sync_latest_survey.py"
      - ".github/workflows/sync-latest-survey.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-latest-survey
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate README and project-page metadata
        run: python scripts/sync_latest_survey.py

      - name: Validate generated snapshot
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('.')
          manifest = json.loads((root / 'docs/assets/benchmarks.json').read_text())
          assert manifest['total'] == 82
          assert manifest['crossCategory'] == 43
          assert len(manifest['records']) == 82
          html = (root / 'docs/index.html').read_text()
          assert 'A Survey of World Model Benchmarks' in html
          assert 'id="stat-cross">43<' in html
          assert 'app-v3.js?v=4' in html
          print('Validated 82 benchmarks and 43 cross-category entries.')
          PY

      - name: Commit synchronized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Readme.md docs/index.html docs/404.html docs/assets/benchmarks.json docs/assets/metadata.json docs/assets/social-preview.svg
          git diff --cached --quiet || git commit -m "Align repository and project page with latest manuscript"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload project page
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
