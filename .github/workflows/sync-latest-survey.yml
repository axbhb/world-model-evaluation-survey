name: Validate latest survey snapshot

on:
  push:
    branches: ["main"]
    paths:
      - "Readme.md"
      - "docs/**"
      - "scripts/sync_latest_survey.py"
      - ".github/workflows/sync-latest-survey.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-latest-survey
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate the latest manuscript snapshot
        run: python scripts/sync_latest_survey.py
