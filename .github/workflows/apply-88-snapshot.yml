name: Apply 88-benchmark manuscript snapshot

# This workflow applies the latest uploaded manuscript snapshot to the data, README, and Pages site.
on:
  push:
    branches: ["main"]
    paths:
      - "scripts/apply_88_snapshot.py"
      - ".github/workflows/apply-88-snapshot.yml"
  issues:
    types: [opened]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-88-benchmark-snapshot
  cancel-in-progress: true

jobs:
  align:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, '[sync-88]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply the latest manuscript snapshot
        run: python scripts/apply_88_snapshot.py

      - name: Validate the synchronized repository
        run: python scripts/sync_latest_survey.py

      - name: Commit synchronized files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Repository is already synchronized."
            exit 0
          fi
          git config user.name "axbhb"
          git config user.email "144993397+axbhb@users.noreply.github.com"
          git add Readme.md docs scripts/generate_readme_index.py scripts/sync_latest_survey.py
          git commit -m "Align repository and project page with 88-benchmark survey"
          git push
